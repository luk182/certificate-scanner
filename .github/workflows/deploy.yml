name: Deploy Certificate Scanner

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: app-cert-scanner-dev
  PYTHON_VERSION: '3.12'
  RESOURCE_GROUP: rg-cert-scanner-dev

jobs:
  infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep infrastructure
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: eastus
          template: infra/main.bicep
          parameters: >
            infra/parameters/dev.bicepparam
            tenantId=${{ secrets.AZURE_TENANT_ID }}
            clientId=${{ secrets.APP_CLIENT_ID }}

  build-and-deploy:
    name: Build and Deploy App
    runs-on: ubuntu-latest
    needs: infrastructure
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: .

      - name: Set sensitive App Service settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              {"name": "AZURE_CLIENT_SECRET",          "value": "${{ secrets.APP_CLIENT_SECRET }}", "slotSetting": false},
              {"name": "SECRET_KEY",                   "value": "${{ secrets.FLASK_SECRET_KEY }}",  "slotSetting": false},
              {"name": "LOG_ANALYTICS_DCE_ENDPOINT",   "value": "${{ secrets.LOG_ANALYTICS_DCE_ENDPOINT }}", "slotSetting": false},
              {"name": "LOG_ANALYTICS_DCR_IMMUTABLE_ID","value": "${{ secrets.LOG_ANALYTICS_DCR_IMMUTABLE_ID }}", "slotSetting": false}
            ]
