{% extends "base.html" %}
{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-gear me-2 text-primary"></i>Settings</h4>
<div class="card p-4" style="max-width:620px;">
  <form id="settingsForm">
    <h6 class="fw-semibold mb-3 text-uppercase text-muted small">Scan Scope</h6>
    <div class="mb-3">
      <select class="form-select" id="scopeType" name="scope_type" onchange="toggleScope()">
        <option value="subscriptions">By Subscriptions</option>
        <option value="management_groups">By Management Groups</option>
      </select>
    </div>
    <div class="mb-4" id="subscriptionInput">
      <label class="form-label">Subscription IDs
        <small class="text-muted fw-normal">(one per line or comma-separated)</small>
      </label>
      <textarea class="form-control font-monospace" id="subscriptionIds" rows="4"
        placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"></textarea>
    </div>
    <div class="mb-4 d-none" id="mgInput">
      <label class="form-label">Management Group IDs
        <small class="text-muted fw-normal">(one per line or comma-separated)</small>
      </label>
      <textarea class="form-control font-monospace" id="mgIds" rows="4"></textarea>
    </div>

    <hr/>
    <h6 class="fw-semibold mb-3 text-uppercase text-muted small">Scan Frequency</h6>
    <div class="mb-4">
      <div class="form-check mb-2">
        <input class="form-check-input" type="radio" name="frequency" value="daily" id="daily" checked/>
        <label class="form-check-label" for="daily">
          <strong>Daily</strong> <span class="text-muted small">– runs every day at 02:00 UTC</span>
        </label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="frequency" value="weekly" id="weekly"/>
        <label class="form-check-label" for="weekly">
          <strong>Weekly</strong> <span class="text-muted small">– runs every Monday at 02:00 UTC</span>
        </label>
      </div>
    </div>

    <div class="d-flex align-items-center gap-3">
      <button type="submit" class="btn btn-primary px-4">
        <i class="bi bi-save me-1"></i>Save Settings
      </button>
      <span id="saveMsg" class="text-success d-none">
        <i class="bi bi-check-circle-fill me-1"></i>Saved successfully!
      </span>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/settings.js') }}"></script>
{% endblock %}
