<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Certificate Scanner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet"/>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="/dashboard">
      <i class="bi bi-shield-lock-fill me-2"></i>Certificate Scanner
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">
            <i class="bi bi-grid me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/certificates' %}active{% endif %}" href="/certificates">
            <i class="bi bi-table me-1"></i>Certificates
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/settings' %}active{% endif %}" href="/settings">
            <i class="bi bi-gear me-1"></i>Settings
          </a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm btn-outline-light" id="runScanBtn" onclick="triggerScan()">
          <i class="bi bi-arrow-clockwise me-1"></i>Run Scan Now
        </button>
        <span class="text-light small">
          <i class="bi bi-person-circle me-1"></i>{{ user.get('preferred_username', '') }}
        </span>
        <a href="/logout" class="btn btn-sm btn-outline-danger">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </a>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-4 px-4">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    async function triggerScan() {
      const btn = document.getElementById('runScanBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Scanning...';
      try {
        const res = await fetch('/api/scan/run', { method: 'POST' });
        const data = await res.json();
        btn.innerHTML = '<i class="bi bi-check-lg me-1"></i>Scan Started';
        setTimeout(() => {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i>Run Scan Now';
        }, 3000);
      } catch (e) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i>Run Scan Now';
      }
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
