<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Certificate Scanner – Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; }
    .login-card { border-radius: 16px; border: none; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
  <div class="card login-card p-5 text-center" style="min-width:380px; max-width:420px;">
    <div class="mb-3">
      <i class="bi bi-shield-lock-fill text-primary" style="font-size:3rem;"></i>
    </div>
    <h2 class="fw-bold mb-1">Certificate Scanner</h2>
    <p class="text-muted mb-4">Azure Certificate Inventory &amp; Monitoring</p>
    {% if error %}
      <div class="alert alert-danger text-start small">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
      </div>
    {% endif %}
    <a href="{{ auth_url }}" class="btn btn-primary btn-lg w-100 d-flex align-items-center justify-content-center gap-2">
      <i class="bi bi-microsoft"></i> Sign in with Microsoft
    </a>
    <p class="text-muted mt-3 small">Sign in with your Azure AD account to continue</p>
  </div>
</body>
</html>
