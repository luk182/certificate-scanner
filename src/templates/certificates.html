{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="fw-bold mb-0"><i class="bi bi-table me-2 text-primary"></i>Certificates</h4>
  <a href="/api/certificates/export" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-download me-1"></i>Export CSV
  </a>
</div>

<div class="card mb-3 p-3">
  <div class="row g-2 align-items-center">
    <div class="col-auto">
      <label class="form-label mb-0 fw-semibold small">Resource Type</label>
      <select class="form-select form-select-sm" id="filterType" onchange="loadCerts()" style="min-width:160px;">
        <option value="">All Types</option>
        <option>APIM</option>
        <option>App Gateway</option>
        <option>App Service</option>
        <option>Functions</option>
        <option>Logic Apps</option>
        <option>Front Door</option>
      </select>
    </div>
    <div class="col-auto">
      <label class="form-label mb-0 fw-semibold small">Status</label>
      <select class="form-select form-select-sm" id="filterStatus" onchange="loadCerts()" style="min-width:140px;">
        <option value="">All Statuses</option>
        <option value="healthy">Healthy (&gt;90 days)</option>
        <option value="warning">Expiring (&le;90 days)</option>
        <option value="expired">Expired</option>
      </select>
    </div>
    <div class="col-auto ms-auto align-self-end">
      <span class="text-muted small" id="certCount"></span>
    </div>
  </div>
</div>

<div class="card">
  <div class="table-responsive">
    <table class="table table-hover table-sm align-middle mb-0">
      <thead class="table-dark">
        <tr>
          <th>Cert Name</th>
          <th>Resource Type</th>
          <th>Resource Name</th>
          <th>Subscription</th>
          <th>URLs / SNI</th>
          <th>Expiration</th>
          <th>Days Left</th>
          <th>Location</th>
          <th>Key Vault</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="certTableBody">
        <tr><td colspan="10" class="text-center py-4">
          <div class="spinner-border spinner-border-sm text-primary me-2"></div>Loading...
        </td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/certificates.js') }}"></script>
{% endblock %}
